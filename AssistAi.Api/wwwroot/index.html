<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AssistAi — Chat with powerful AI models. Web search, code generation, and more.">
    <title>AssistAi — Chat</title>

    <!-- Google Fonts: Space Grotesk + JetBrains Mono (for code blocks) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <!-- ====== Sidebar ====== -->
    <aside class="sidebar" id="sidebar">
        <!-- Brand -->
        <div class="sidebar-brand">
            <div class="brand-logo">
                <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                    <defs>
                        <linearGradient id="sidebarLogoGrad" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#a855f7" />
                            <stop offset="100%" stop-color="#6366f1" />
                        </linearGradient>
                    </defs>
                    <rect rx="10" width="40" height="40" fill="url(#sidebarLogoGrad)" />
                    <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="18"
                        font-weight="700" font-family="Space Grotesk">Ai</text>
                </svg>
            </div>
            <span class="brand-text">AssistAi</span>
        </div>

        <!-- Model Selector -->
        <div class="model-selector">
            <label for="model-select" class="model-label">Model</label>
            <div class="select-wrapper">
                <select id="model-select" class="model-dropdown">
                    <option value="">Loading models...</option>
                </select>
                <!-- Custom dropdown arrow -->
                <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <polyline points="6 9 12 15 18 9" />
                </svg>
            </div>
        </div>

        <!-- New Chat Button -->
        <button class="btn-new-chat" id="btn-new-chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            <span>New Chat</span>
        </button>

        <!-- Chat History -->
        <div class="chat-history" id="chat-history">
            <div class="history-label">Recent Chats</div>
            <div class="history-list" id="history-list">
                <!-- Chat history items will be inserted here dynamically -->
            </div>
        </div>

        <!-- Sidebar Footer: User Info -->
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar">U</div>
                <span class="user-name" id="user-name">User</span>
            </div>
            <button class="btn-logout" id="btn-logout" title="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </button>
        </div>
    </aside>

    <!-- ====== Mobile sidebar toggle ====== -->
    <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
    </button>

    <!-- ====== Main Chat Area ====== -->
    <main class="chat-main" id="chat-main">

        <!-- Chat Messages -->
        <div class="chat-messages" id="chat-messages">
            <!-- Welcome message shown when no messages -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-icon">
                    <svg width="56" height="56" viewBox="0 0 40 40" fill="none">
                        <defs>
                            <linearGradient id="welcomeGrad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#a855f7" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                        <rect rx="10" width="40" height="40" fill="url(#welcomeGrad)" />
                        <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="18"
                            font-weight="700" font-family="Space Grotesk">Ai</text>
                    </svg>
                </div>
                <h2 class="welcome-title">How can I help you today?</h2>
                <p class="welcome-subtitle">Choose a model above and start chatting. I can search the web, write code,
                    and more.</p>

                <!-- Quick suggestion cards -->
                <div class="suggestions" id="suggestions">
                    <button class="suggestion-card" data-prompt="Search the web for the latest tech news">
                        <span class="suggestion-icon">🔍</span>
                        <span class="suggestion-text">Search the web for the latest tech news</span>
                    </button>
                    <button class="suggestion-card" data-prompt="Write a simple C# hello world program and explain it">
                        <span class="suggestion-icon">💻</span>
                        <span class="suggestion-text">Write a C# hello world program</span>
                    </button>
                    <button class="suggestion-card" data-prompt="Explain how JWT authentication works">
                        <span class="suggestion-icon">🔐</span>
                        <span class="suggestion-text">Explain JWT authentication</span>
                    </button>
                    <button class="suggestion-card" data-prompt="What are the best practices for REST API design?">
                        <span class="suggestion-icon">📚</span>
                        <span class="suggestion-text">REST API best practices</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area" id="chat-input-area">
            <div class="input-container">
                <textarea id="chat-input" class="chat-input" placeholder="Type a message..." rows="1"
                    maxlength="4000"></textarea>
                <button class="btn-send" id="btn-send" title="Send message" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <div class="input-footer">
                <span class="char-count" id="char-count">0 / 4000</span>
            </div>
        </div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="/js/app.js"></script>
</body>

</html>
