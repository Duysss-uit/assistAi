<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AssistAi — Your AI Assistant. Sign in to start chatting with powerful AI models.">
    <title>AssistAi — Sign In</title>

    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <!-- Animated background particles -->
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Glow orbs for ambient lighting -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>

    <!-- Main Auth Card -->
    <main class="auth-container">
        <div class="auth-card" id="auth-card">

            <!-- Logo & Brand -->
            <div class="brand">
                <div class="brand-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#a855f7"/>
                                <stop offset="100%" stop-color="#6366f1"/>
                            </linearGradient>
                        </defs>
                        <rect rx="10" width="40" height="40" fill="url(#logoGrad)"/>
                        <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="18" font-weight="700" font-family="Space Grotesk">Ai</text>
                    </svg>
                </div>
                <h1 class="brand-name">AssistAi</h1>
                <p class="brand-tagline" id="brand-tagline">Sign in to your account</p>
            </div>

            <!-- Error/Success Messages -->
            <div class="message" id="message"></div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="login-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" id="login-loader">
                        <svg class="spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="31.4 31.4"/></svg>
                    </span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" placeholder="Choose a username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" placeholder="Create a password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary" id="register-btn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader" id="register-loader">
                        <svg class="spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="31.4 31.4"/></svg>
                    </span>
                </button>
            </form>

            <!-- Toggle between Login / Register -->
            <div class="auth-toggle">
                <span id="toggle-text">Don't have an account?</span>
                <a href="#" id="toggle-link">Register</a>
            </div>
        </div>
    </main>

    <script src="/js/login.js"></script>
</body>
</html>
